plugins {
    id 'edu.wpi.first.WpilibTools' version '1.3.0'
}

ext {
    nativeName = "photontargeting"
}

apply plugin: 'cpp'
apply plugin: 'google-test-test-suite'
apply plugin: 'edu.wpi.first.NativeUtils'

apply from: "${rootDir}/shared/config.gradle"
apply from: "${rootDir}/shared/javacommon.gradle"

apply from: "${rootDir}/versioningHelper.gradle"

nativeUtils {
    exportsConfigs {
        "${nativeName}" {}
    }
}

sourceSets.main.java.srcDir "${projectDir}/src/generated/main/java"

apply plugin: 'edu.wpi.first.GradleJni'

model {
    components {
        "${nativeName}"(NativeLibrarySpec) {
            sources {
                cpp {
                    source {
                        srcDirs 'src/main/native/cpp', "$buildDir/generated/source/proto/main/cpp", 'src/generated/main/native/cpp'
                        include '**/*.cpp', '**/*.cc'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/generated/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/generated/main/native/include'
                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                        include "**/*.h"
                    }
                }
            }

            binaries.all {
                it.tasks.withType(CppCompile) {
                    it.dependsOn generateProto
                }
            }

            nativeUtils.useRequiredLibrary(it, "wpilib_shared")
            nativeUtils.useRequiredLibrary(it, "apriltag_shared")
            nativeUtils.useRequiredLibrary(it, "opencv_shared")
        }
        "${nativeName}JNI"(JniNativeLibrarySpec) {
            
            enableCheckTask project.hasProperty('doJniCheck')
            javaCompileTasks << compileJava
            jniCrossCompileOptions << JniCrossCompileOptions(nativeUtils.wpi.platforms.roborio)
            jniCrossCompileOptions << JniCrossCompileOptions(nativeUtils.wpi.platforms.linuxarm32)
            jniCrossCompileOptions << JniCrossCompileOptions(nativeUtils.wpi.platforms.linuxarm64)
            
            sources {
                cpp {
                    source {
                        srcDirs 'src/main/native/jni'
                        include '**/*.cpp', '**/*.cc'
                    }
                }
            }

            binaries.all {
                lib library: nativeName, linkage: 'shared'
                nativeUtils.useRequiredLibrary(it, "opencv_shared")
            }
        }

        all {
            binaries.withType(SharedLibraryBinarySpec) { binary ->
                if (binary.targetPlatform.name == jniPlatform) {
                    
                    def isDebug = binary.buildType.name.contains('debug')

                    if (binary.library.name == nativeName) {
                        // println("============ base library =======")
                    }
                    if (binary.library.name == nativeName + "JNI") {
                        // println("============ JNI library =======")
                    }

                    println("$binary.library.name - isDebug = $isDebug")

                    if (!isDebug) {
                        println binary.sharedLibraryFile
                        // println binary.identifier.properties

                        jar {
                            from binary.sharedLibraryFile
                            dependsOn binary.identifier.projectScopedName
                        }

                    }

                    // println binary.properties
                    // println nativeUtils.getPlatformPath(it)
                    // println binary.sharedLibraryFile
                    // println binary.buildTask
                    // println binary.properties.toString()
                    // println it.library.name
                    // println it.targetPlatform.properties
                    // println it.targetPlatform.name == jniPlatform


                    // [sharedLibraryFile:/home/mmorley/photonvision/photon-targeting/build/libs/photontargetingJNI/shared/linuxx86-64/debug/libphotontargetingJNI.so, toolChain:Tool chain 'gcc' (GNU GCC), library:native library 'photontargetingJNI', staticLibArchiver:org.gradle.nativeplatform.internal.DefaultTool@4f80eaf9, id:project ':photon-targeting' library 'photontargetingJNI' variant 'linuxx86-64DebugSharedLibrary', inputs:[C++ source 'photontargetingJNI:cpp'], sharedLibraryLinkFile:/home/mmorley/photonvision/photon-targeting/build/libs/photontargetingJNI/shared/linuxx86-64/debug/libphotontargetingJNI.so, targetPlatform:platform 'linuxx86-64', assembler:org.gradle.nativeplatform.internal.DefaultTool@15a341e4, checkTask:task ':photon-targeting:checkPhotontargetingJNILinuxx86-64DebugSharedLibrary', headerDirs:Headers for shared library 'photontargetingJNI:linuxx86-64:debug:sharedLibrary', buildTask:task ':photon-targeting:photontargetingJNILinuxx86-64DebugSharedLibrary', sources:ModelMap<LanguageSourceSet> 'components.photontargetingJNI.binaries.linuxx86-64DebugSharedLibrary.sources', class:class org.gradle.nativeplatform.SharedLibraryBinarySpec$NodeView$org_gradle_nativeplatform_internal_DefaultSharedLibraryBinarySpec, buildType:build type 'debug', projectScopedName:photontargetingJNILinuxx86-64DebugSharedLibrary, objcppCompiler:org.gradle.nativeplatform.internal.DefaultPreprocessingTool@6c64b0b5, rcCompiler:org.gradle.nativeplatform.internal.DefaultPreprocessingTool@3c52cb1d, primaryOutput:/home/mmorley/photonvision/photon-targeting/build/libs/photontargetingJNI/shared/linuxx86-64/debug/libphotontargetingJNI.so, runtimeFiles:Runtime files for shared library 'photontargetingJNI:linuxx86-64:debug:sharedLibrary', buildAbility:org.gradle.platform.base.internal.ToolSearchBuildAbility@46026c66, cppCompiler:org.gradle.nativeplatform.internal.DefaultPreprocessingTool@7b6efa50, displayName:shared library 'photontargetingJNI:linuxx86-64:debug:sharedLibrary', backingNode