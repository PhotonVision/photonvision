---
java_imports:
- 'org.wpilib.math.geometry.Rotation3d'
- 'org.wpilib.math.geometry.Translation3d'
- 'org.wpilib.math.geometry.Transform3d'
cpp_includes:
- '<wpi/math/geometry/Rotation3d.hpp>'
- '<wpi/math/geometry/Translation3d.hpp>'
- '<wpi/math/geometry/Transform3d.hpp>'
python_imports:
- 'from wpimath.geometry import Rotation3d'
- 'from wpimath.geometry import Translation3d'
- 'from wpimath.geometry import Transform3d'
tests:
- name: Int8Test
  type: Int8TestMessage
  cases:
  - name: default_test
  - name: optional_test
    fields:
    - name: optTest
      java_value: 'Optional.of((byte) 3)'
      cpp_value: '{3}'
      python_value: '3'
  - name: vla_test
    fields:
    - name: vlaTest
      java_value: 'List.of((byte) 1, (byte) 2, (byte) 3)'
      cpp_value: '{1, 2, 3}'
      python_value: '[1, 2, 3]'
  - name: general_test
    fields:
    - name: test
      java_value: '(byte) 42'
      cpp_value: '42'
      python_value: '42'
    fields:
    - name: optTest
      java_value: 'Optional.of((byte) 7)'
      cpp_value: '{7}'
      python_value: '7'
    fields:
    - name: vlaTest
      java_value: 'List.of((byte) 4, (byte) 5, (byte) 6)'
      cpp_value: '{4, 5, 6}'
      python_value: '[4, 5, 6]'
- name: Int16Test
