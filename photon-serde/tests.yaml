- name: BoolTest
  type: BoolTestMessage
  cases:
  - name: default_test
  - name: optional_test
    fields:
    - name: optTest
      java_value: 'Optional.of(true)'
      cpp_value: '{true}'
      python_value: 'True'
  - name: vla_test
    fields:
    - name: vlaTest
      java_value: 'List.of(true, false, true)'
      cpp_value: '{true, false, true}'
      python_value: '[True, False, True]'
  - name: general_test
    fields:
    - name: test
      java_value: 'false'
      cpp_value: 'false'
      python_value: 'False'
    - name: optTest
      java_value: 'Optional.of(true)'
      cpp_value: '{true}'
      python_value: 'True'
    - name: vlaTest
      java_value: 'List.of(true, false, true)'
      cpp_value: '{true, false, true}'
      python_value: '[True, False, True]'
- name: Transform3dTest
  type: Transform3dTestMessage
  cases:
  - name: default_test
  - name: optional_test
    fields:
    - name: optTest
      java_value: 'Optional.of(new Transform3d(new Translation3d(1.0, 2.0, 3.0), new Rotation3d(0.1, 0.2, 0.3)))'
      cpp_value: '{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}}'
      python_value: 'Transform3d(Translation3d(1.0, 2.0, 3.0), Rotation3d(0.1, 0.2, 0.3))'
  - name: vla_test
    fields:
    - name: vlaTest
      java_value: 'List.of(new Transform3d(new Translation3d(1.0, 2.0, 3.0), new Rotation3d(0.1, 0.2, 0.3)), new Transform3d(new Translation3d(4.0, 5.0, 6.0), new Rotation3d(0.4, 0.5, 0.6)))'
      cpp_value: '{{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}},{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}},{8_m, 2_m, 1_m, wpi::math::Rotation3d{0_deg, 1_deg, 88_deg}}}'
      python_value: '[Transform3d(Translation3d(1.0, 2.0, 3.0), Rotation3d(0.1, 0.2, 0.3)), Transform3d(Translation3d(4.0, 5.0, 6.0), Rotation3d(0.4, 0.5, 0.6))]'
  - name: general_test
    fields:
    - name: test
      java_value: 'new Transform3d(new Translation3d(7.0, 8.0, 9.0), new Rotation3d(0.7, 0.8, 0.9))'
      cpp_value: '{8_m, 2_m, 1_m, wpi::math::Rotation3d{0_deg, 1_deg, 88_deg}}'
      python_value: 'Transform3d(Translation3d(7.0, 8.0, 9.0), Rotation3d(0.7, 0.8, 0.9))'
    - name: optTest
      java_value: 'Optional.of(new Transform3d(new Translation3d(1.0, 2.0, 3.0), new Rotation3d(0.1, 0.2, 0.3)))'
      cpp_value: '{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}}'
      python_value: 'Transform3d(Translation3d(1.0, 2.0, 3.0), Rotation3d(0.1, 0.2, 0.3))'
    - name: vlaTest
      java_value: 'List.of(new Transform3d(new Translation3d(1.0, 2.0, 3.0), new Rotation3d(0.1, 0.2, 0.3)), new Transform3d(new Translation3d(4.0, 5.0, 6.0), new Rotation3d(0.4, 0.5, 0.6)))'
      cpp_value: '{{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}},{1_m, 2_m, 3_m, wpi::math::Rotation3d{6_deg, 7_deg, 12_deg}},{8_m, 2_m, 1_m, wpi::math::Rotation3d{0_deg, 1_deg, 88_deg}}}'
      python_value: '[Transform3d(Translation3d(1.0, 2.0, 3.0), Rotation3d(0.1, 0.2, 0.3)), Transform3d(Translation3d(4.0, 5.0, 6.0), Rotation3d(0.4, 0.5, 0.6))]'